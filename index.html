<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#202954" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Elchi" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elchi Pochta</title>
    <script>
      (() => {
        let savedTheme;
        try {
          savedTheme = localStorage.getItem("theme");
        } catch {
          // Dark remains the default when storage is unavailable.
        }
        document.documentElement.classList.add(savedTheme === "light" ? "light" : "dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
